<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | สมัครแข่งขัน</title>
    <link rel="stylesheet" href="style.css?v=grandlux">
    <style>
        .campaign-header { text-align: center; margin-bottom: 30px; }
        .campaign-banner {
            display: none;
            width: min(100%, 420px);
            max-height: 220px;
            object-fit: contain;
            margin: 0 auto 20px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 10px 24px rgba(0,0,0,0.35);
            cursor: zoom-in;
        }
        .info-box { background: #252525; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #00d4ff; text-align: left;}
        .jersey-preview {
            max-width: min(100%, 280px);
            display: none;
            margin: 10px auto;
            border-radius: 12px;
            background:#111;
            padding: 8px;
            cursor: zoom-in;
        }
        .size-chart-preview {
            max-width: 100%;
            display: block;
            margin: 10px auto;
            border-radius: 12px;
            background:#111;
            padding: 8px;
            cursor: zoom-in;
        }
        
        /* 🛠️ แก้ไขส่วนของ Modal แสดงรูปภาพ 🛠️ */
        #imagePreviewModal {
            display: none;
            position: relative;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw;
            min-height: 100vh;
            z-index: 99999;
            background: rgba(5, 8, 12, 0.95); /* พื้นหลังเข้มขึ้นนิดนึงให้รูปเด่น */
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }
        #imagePreviewModal.open {
            display: flex !important;
        }
        
        /* 🛠️ ล็อกตำแหน่งปุ่มปิดให้อยู่มุมขวาบนเสมอ 🛠️ */
        #closeImagePreviewBtn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 35px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            z-index: 100000;
            background: rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        #closeImagePreviewBtn:hover {
            background: #dc3545; /* เปลี่ยนเป็นสีแดงตอนเอาเมาส์ชี้ */
        }
        
        #previewModalImage {
            display: block;
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        /* ------------------------------------- */

        select { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; font-family: inherit; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div id="loading" style="text-align:center; font-size: 1.5em; color: #00d4ff; padding: 50px 0;">⏳ กำลังโหลดข้อมูลรายการแข่งขัน...</div>
        
        <div id="registrationContent" style="display: none;">
            <div class="campaign-header">
                <img id="bannerImg" class="campaign-banner" style="display:none;" alt="Banner">
                <h1 id="cName" style="color: #fff; margin-bottom: 10px; text-transform: uppercase;">ชื่อรายการ</h1>
                <div class="info-box">
                    <h3 style="color:#00d4ff; margin-top:0;">📜 กติกาและรายละเอียด</h3>
                    <p id="cRules" style="white-space: pre-line; color:#ddd; line-height: 1.6;"></p>
                    <hr style="border-color:#444; margin: 15px 0;">
                    <p style="font-size: 1.2em; margin:0;">💵 ค่าสมัคร: <strong id="cFee" style="color:#f39c12; font-size: 1.4em;"></strong> บาท</p>
                    <div id="prizeWrap" style="display:none; margin-top:15px;">
                        <hr style="border-color:#444; margin: 15px 0;">
                        <p style="font-size: 1.08em; margin:0 0 8px 0;">🏆 รางวัลการแข่งขัน</p>
                        <p id="cPrize" style="white-space: pre-line; color:#ffd76a; line-height: 1.7; margin:0;"></p>
                    </div>
                </div>
            </div>

            <div class="form-container">
                <h2 style="text-align: center; color: #fff; margin-top:0; margin-bottom: 20px;">📝 กรอกข้อมูลสมัครแข่งขัน</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label>ชื่อผู้เข้าแข่งขัน (หรือชื่อทีม) *</label>
                        <input type="text" id="playerName" placeholder="กรอกชื่อของคุณ" required>
                    </div>
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์ติดต่อ *</label>
                        <input type="tel" id="playerPhone" placeholder="08X-XXX-XXXX" required>
                    </div>
                    
                    <div id="jerseySection" class="form-group" style="display:none; background:#222; padding:15px; border-radius:8px; border: 1px dashed #555;">
                        <label style="color:#00d4ff;">👕 รูปแบบเสื้อแข่งขัน</label>
                        <img id="jerseyImg" class="jersey-preview" alt="Jersey" style="display:none;">
                        <div id="sizeChartWrap" style="display:none; margin-top:15px;">
                            <label style="color:#00d4ff;">📏 ตารางไซส์เสื้อ</label>
                            <img id="sizeChartImg" class="size-chart-preview" alt="Size chart">
                        </div>
                        <label style="margin-top:15px;">ไซส์เสื้อที่ต้องการ</label>
                        <select id="jerseySize">
                            <option value="-">ไม่ระบุ / ไม่รับเสื้อ</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">2XL</option>
                            <option value="3XL">3XL</option>
                            <option value="4XL">4XL</option>
                            <option value="5XL">5XL</option>
                            <option value="6XL">6XL</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>แนบสลิปโอนเงินค่าสมัคร *</label>
                        <input type="file" id="paymentSlip" accept="image/*" required>
                    </div>

                    <button type="submit" class="btn-confirm" id="submitBtn" style="width:100%; font-size:1.2em; margin-top:10px;">✅ ยืนยันการสมัคร</button>
                </form>
            </div>
        </div>

        <div id="successMessage" style="display: none; text-align:center; padding: 50px 20px;">
            <h1 style="color: #28a745; font-size: 4em; margin:0;">🎉</h1>
            <h2 style="color: #fff;">สมัครเรียบร้อยแล้ว!</h2>
            <p style="color: #aaa; font-size: 1.1em; line-height: 1.6;">ข้อมูลและสลิปของคุณถูกส่งไปยังผู้จัดงานแล้ว<br>กรุณารอแอดมินตรวจสอบและประกาศสายการแข่งขันต่อไป</p>
        </div>
    </div>

    <div id="imagePreviewModal" class="img-modal">
        <span id="closeImagePreviewBtn" class="close-modal">&times;</span>
        <img class="img-modal-content" id="previewModalImage" alt="Expanded preview">
    </div>

    <script type="module">
        import { db, doc, getDoc, getDocs, query, where, collection, addDoc } from "./firebase-config.js";

        // ดึง ID แคมเปญจาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('campaign');

        window.openImagePreview = (src) => {
            if (!src) return;
            const modal = document.getElementById('imagePreviewModal');
            const image = document.getElementById('previewModalImage');
            image.src = src;
            modal.classList.add('open');
            document.body.style.overflow = 'auto';
        };

        window.closeImagePreview = () => {
            const modal = document.getElementById('imagePreviewModal');
            modal.classList.remove('open');
            document.body.style.overflow = 'auto';
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.closeImagePreview();
        });

        document.getElementById('imagePreviewModal').addEventListener('click', (e) => {
            if (e.target.id === 'imagePreviewModal') window.closeImagePreview();
        });

        document.getElementById('closeImagePreviewBtn').addEventListener('click', () => {
            window.closeImagePreview();
        });

        const bindExpandableImage = (id, src) => {
            const img = document.getElementById(id);
            if (!img || !src) return;

            img.src = src;
            img.style.display = 'block';
            img.style.cursor = 'zoom-in';

            if (!img.dataset.expandBound) {
                img.addEventListener('click', () => {
                    if (img.src) window.openImagePreview(img.src);
                });
                img.dataset.expandBound = 'true';
            }
        };

        async function loadCampaign() {
            if (!campaignId) {
                document.getElementById('loading').innerText = "❌ ไม่พบรหัสรายการแข่งขัน (URL ไม่ถูกต้อง)";
                return;
            }
            try {
                const docSnap = await getDoc(doc(db, "campaigns", campaignId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // นำข้อมูลมาแสดงบนหน้าจอ
                    document.getElementById('cName').innerText = data.name;
                    document.getElementById('cRules').innerText = data.rules;
                    document.getElementById('cFee').innerText = data.fee;

                    const prizeText = (data.prize || "").trim();
                    if (prizeText) {
                        document.getElementById('prizeWrap').style.display = 'block';
                        document.getElementById('cPrize').innerText = prizeText;
                    } else {
                        document.getElementById('prizeWrap').style.display = 'none';
                    }
                    
                    // โชว์แบนเนอร์ ถ้าแอดมินอัปโหลดไว้
                    if (data.bannerImg) {
                        bindExpandableImage('bannerImg', data.bannerImg);
                    }

                    // โชว์ข้อมูลเสื้อและตารางไซส์ ถ้าแอดมินอัปโหลดไว้
                    if (data.jerseyImg || data.sizeChartImg) {
                        document.getElementById('jerseySection').style.display = 'block';
                    }
                    if (data.jerseyImg) {
                        bindExpandableImage('jerseyImg', data.jerseyImg);
                    }
                    if (data.sizeChartImg) {
                        document.getElementById('sizeChartWrap').style.display = 'block';
                        bindExpandableImage('sizeChartImg', data.sizeChartImg);
                    }

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('registrationContent').style.display = 'block';
                } else {
                    document.getElementById('loading').innerText = "❌ ไม่พบข้อมูลรายการนี้ (อาจถูกลบหรือปิดรับสมัครแล้ว)";
                }
            } catch (e) {
                document.getElementById('loading').innerText = "❌ เกิดข้อผิดพลาด: " + e.message;
            }
        }

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                const max = 800; // ย่อขนาดให้กว้าง/ยาวสูงสุดไม่เกิน 800px
                if (w > h && w > max) { h *= max / w; w = max; }
                else if (h > max) { w *= max / h; h = max; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                // บีบอัดเป็น JPEG คุณภาพ 70%
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
        };
        reader.onerror = reject;
    });

        const normalizePlayerName = (value) => value.trim().replace(/\s+/g, ' ').toLowerCase();

        // จัดการเมื่อกดปุ่ม Submit
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ กำลังส่งข้อมูล...";
            btn.disabled = true;

            try {
                const playerName = document.getElementById('playerName').value.trim();
                const normalizedPlayerName = normalizePlayerName(playerName);

                const existingRegs = await getDocs(query(collection(db, "registrations"), where("campaignId", "==", campaignId)));
                const duplicateExists = existingRegs.docs.some((docSnap) => {
                    const existingName = docSnap.data().playerName || "";
                    return normalizePlayerName(existingName) === normalizedPlayerName;
                });

                if (duplicateExists) {
                    alert("❌ มีผู้สมัครใช้ชื่อนี้แล้ว กรุณาตรวจสอบชื่อหรือเพิ่มข้อมูลกำกับให้ต่างจากเดิม");
                    btn.innerText = "✅ ยืนยันการสมัคร";
                    btn.disabled = false;
                    return;
                }

                // แปลงสลิปโอนเงินเป็น Base64
                const slipFile = document.getElementById('paymentSlip').files[0];
                const slipBase64 = await fileToBase64(slipFile);

                // สร้าง Object เก็บข้อมูลคนสมัคร
                const regData = {
                    campaignId: campaignId,
                    playerName: playerName,
                    phone: document.getElementById('playerPhone').value.trim(),
                    jerseySize: document.getElementById('jerseySize') ? document.getElementById('jerseySize').value : "-",
                    paymentSlip: slipBase64,
                    status: "pending", // สถานะรอแอดมินตรวจสอบ
                    registeredAt: new Date().toISOString()
                };

                // บันทึกลงคอลเลกชัน "registrations"
                await addDoc(collection(db, "registrations"), regData);
                
                // โชว์หน้าจอสำเร็จ
                document.getElementById('registrationContent').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                window.scrollTo(0, 0); // เลื่อนจอขึ้นบนสุด
            } catch (error) {
                alert("❌ บันทึกไม่สำเร็จ: " + error.message);
                btn.innerText = "✅ ยืนยันการสมัคร";
                btn.disabled = false;
            }
        });

        // เริ่มโหลดข้อมูลทันทีที่เปิดหน้าเว็บ
        window.onload = loadCampaign;
    </script>
</body>
</html>
