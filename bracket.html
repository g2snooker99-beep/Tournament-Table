<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | จัดการผล</title>
    <link rel="stylesheet" href="style.css?v=grandlux">
    <style>
        body { overflow: hidden; height: 100vh; margin: 0; background: var(--bg-dark); }
        .bracket-full-container { display: flex; flex-direction: column; height: 100%; width: 100vw; padding: 20px; box-sizing: border-box; }
        #bracketWrapper { flex: 1; overflow: auto; display: flex; align-items: center; padding-top: 20px; }
        .bracket-visual { margin: auto; padding: 40px; transition: 0.3s; }
        .zone-btn { padding: 8px 20px; margin: 0 5px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1.1em; }
        .zone-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); transform: scale(1.05); }
        .zone-btn.inactive { background: #222; color: #aaa; border: 1px solid #444; }
        .zone-btn.inactive:hover { background: #333; color: #fff; }

                /* ── SPONSOR WHEEL ENHANCED ── */
        #sponsorBar {
            flex-shrink: 0; height: 220px; display: flex;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,15,0,0.85));
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 16px; margin: 0 20px 10px;
            box-shadow: 0 0 40px rgba(255,215,0,0.06), inset 0 0 60px rgba(0,0,0,0.5);
        }
        #sponsorBar.hidden { display: none; }
        #sponsorBar::after {
            content: 'POWERED BY'; position: absolute; top: 10px; left: 16px;
            font-size: 8px; letter-spacing: 3px; color: rgba(255,215,0,0.2); font-weight: bold;
        }
        .sp-wheel-slide {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
            opacity: 0; transform: perspective(800px) rotateY(90deg) scale(0.8);
            transition: all 0.65s cubic-bezier(0.4,0,0.2,1); pointer-events: none;
        }
        .sp-wheel-slide.active { opacity: 1; transform: perspective(800px) rotateY(0deg) scale(1); }
        .sp-wheel-slide.exit { opacity: 0; transform: perspective(800px) rotateY(-90deg) scale(0.8); }
        .sp-wheel-slide img {
            max-width: 260px; max-height: 140px; object-fit: contain;
            animation: spGlow 3s ease-in-out infinite;
        }
        @keyframes spGlow {
            0%,100% { filter: drop-shadow(0 0 12px rgba(255,215,0,0.4)) drop-shadow(0 4px 12px rgba(0,0,0,0.8)); }
            50% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.8)) drop-shadow(0 4px 12px rgba(0,0,0,0.8)); }
        }
        .sp-wheel-name {
            color: rgba(255,215,0,0.7); font-size: 10px;
            font-weight: bold; letter-spacing: 3px; text-transform: uppercase;
        }
        #spProgress {
            position: absolute; bottom: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            width: 0%; box-shadow: 0 0 10px #ffd700; border-radius: 0 2px 0 0;
        }
        .sp-wheel-dots {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 5;
        }
        .sp-wheel-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.2); transition: 0.3s; cursor: pointer;
        }
        .sp-wheel-dot.active { background: #ffd700; box-shadow: 0 0 8px #ffd700; transform: scale(1.4); }
        /* Corner glow */
        #sponsorBar::after {
            content: 'POWERED BY';
            position: absolute;
            top: 8px; left: 14px;
            font-size: 8px;
            letter-spacing: 2px;
            color: rgba(255,215,0,0.25);
            font-weight: bold;
        }
        #sponsorMgmtBtn {
            position: fixed;
            top: 80px; right: 18px;
            z-index: 200;
            background: rgba(0,0,0,0.75);
            border: 1px solid #444;
            color: #aaa;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        #sponsorMgmtBtn:hover { border-color: #ffd700; color: #ffd700; }
        #sponsorModal {
            display: none; position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,0.75);
            align-items: center; justify-content: center;
        }
        #sponsorModal.open { display: flex; }
        #sponsorModalBox {
            background: #1a1a1a; border: 1px solid #333;
            border-radius: 16px; padding: 24px;
            width: 420px; max-height: 80vh; overflow-y: auto;
        }
        #sponsorModalBox h3 { margin: 0 0 16px; color: #ffd700; font-size: 15px; }
        .sp-upload-zone {
            border: 2px dashed #444; border-radius: 10px;
            padding: 18px; text-align: center; cursor: pointer;
            margin-bottom: 14px; transition: 0.2s; display: block;
        }
        .sp-upload-zone:hover { border-color: #ffd700; }
        .sp-item {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.04); border: 1px solid #333;
            border-radius: 8px; padding: 8px 10px; margin-bottom: 8px;
        }
        .sp-item img { width: 56px; height: 34px; object-fit: contain; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .sp-item span { flex: 1; font-size: 12px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sp-del { background: rgba(200,30,30,0.2); border: 1px solid rgba(244,68,68,0.3); border-radius: 6px; color: #f88; padding: 3px 8px; cursor: pointer; font-size: 12px; }
        .sp-modal-footer { display: flex; gap: 8px; margin-top: 14px; }
        .sp-modal-footer button { flex: 1; padding: 10px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-close-modal { background: #333; color: #aaa; }
        .btn-close-modal:hover { background: #444; }
    </style>
</head>
<body>
    <div class="bracket-full-container">
        <!-- Header -->
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; flex-shrink: 0; background: var(--card-bg); padding: 15px 30px; border-radius: 15px; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <button onclick="window.location.href='setup.html'" style="background:#333; color:white; padding:12px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; transition:0.2s;" onmouseover="this.style.background='#555'" onmouseout="this.style.background='#333'">⬅ กลับหน้าจัดสาย</button>
            <div style="text-align: center;">
                <h2 id="tournamentTitle" style="margin:0 0 15px 0; color:var(--accent); text-transform:uppercase; letter-spacing:2px;">🏆 โหลดข้อมูล...</h2>
                <div id="zoneNav" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>
            </div>
            <button id="saveBtn" class="btn-confirm" style="padding:12px 30px;">💾 บันทึกผล</button>
        </div>

        <!-- Bracket -->
        <div id="bracketWrapper"><div id="bracket" class="bracket-visual"></div></div>

        <!-- Sponsor Strip -->
        <div id="sponsorBar" class="hidden">
            <div id="sponsorTrack"></div>
        </div>
    </div>

    <!-- Manage button -->
    <button id="sponsorMgmtBtn" onclick="openSponsorModal()">🖼️ สปอนเซอร์</button>

    <!-- Sponsor Modal -->
    <div id="sponsorModal">
        <div id="sponsorModalBox">
            <h3>💰 จัดการสปอนเซอร์</h3>

            <label class="sp-upload-zone">
                <div style="font-size:28px;margin-bottom:4px">🖼️</div>
                <p style="color:#ffd700;font-weight:bold">แตะเพื่ออัพโหลดโลโก้</p>
                <p>PNG / JPG / WebP · บีบอัดอัตโนมัติ · เลือกหลายไฟล์ได้</p>
                <input type="file" accept="image/*" multiple style="display:none" id="spFileInput">
            </label>

            <div id="spList"></div>

            <div style="margin-bottom:10px">
                <label style="color:#888;font-size:11px">ความเร็ว scroll</label>
                <input type="range" id="spSpeed" min="0.2" max="3" step="0.1" value="0.8" style="width:100%;accent-color:#ffd700">
            </div>

            <div class="sp-modal-footer">
                <button class="btn-close-modal" onclick="closeSponsorModal()">✕ ปิด</button>
                <button style="background:#ffd700;color:#000" onclick="closeSponsorModal()">✅ ใช้งาน</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, updateDoc, onSnapshot } from "./firebase-config.js";
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('id');
        window.currentZoneIdx = 0;

        async function resolveTournamentName(data) {
            if (data.campaignName) return data.campaignName;
            if (!data.campaignId) return "";
            try {
                const campaignSnap = await getDoc(doc(db, "campaigns", data.campaignId));
                if (campaignSnap.exists()) return campaignSnap.data().name || "";
            } catch (e) { console.error(e); }
            return "";
        }

        if (!tourneyId) { alert("ไม่พบรหัสการแข่งขัน!"); window.location.href = 'setup.html'; }

        window.renderZoneNav = (totalPlayers) => {
            const nav = document.getElementById('zoneNav');
            nav.innerHTML = '';
            const totalZones = Math.ceil(totalPlayers / 32);
            if (totalZones <= 1) return;
            for (let i = 0; i < totalZones; i++) {
                const btn = document.createElement('button');
                btn.innerText = `ZONE ${String.fromCharCode(65 + i)}`;
                btn.className = `zone-btn ${i === window.currentZoneIdx ? 'active' : 'inactive'}`;
                btn.onclick = () => {
                    window.currentZoneIdx = i;
                    window.renderZoneNav(totalPlayers);
                    window.initBracket(window.currentPlayers, window.currentMatches, window.currentZoneIdx);
                };
                nav.appendChild(btn);
            }
            const finalBtn = document.createElement('button');
            finalBtn.innerText = "🏆 รอบชิงชนะเลิศ (GRAND FINAL)";
            finalBtn.className = `zone-btn ${window.currentZoneIdx === 99 ? 'active' : 'inactive'}`;
            if (window.currentZoneIdx === 99) {
                finalBtn.style.background = "linear-gradient(135deg, #ffd700 0%, #b8860b 100%)";
                finalBtn.style.color = "#000";
                finalBtn.style.boxShadow = "0 0 15px rgba(255, 215, 0, 0.6)";
                finalBtn.style.border = "none";
            } else {
                finalBtn.style.background = "#332b00";
                finalBtn.style.color = "#ffd700";
                finalBtn.style.border = "1px solid #ffd700";
            }
            finalBtn.onclick = () => {
                window.currentZoneIdx = 99;
                window.renderZoneNav(totalPlayers);
                window.initBracket(window.currentPlayers, window.currentMatches, 99);
            };
            nav.appendChild(finalBtn);
        };

        onSnapshot(doc(db, "tournaments", tourneyId), async (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const titleEl = document.getElementById('tournamentTitle');
                const campaignName = await resolveTournamentName(data);
                if (titleEl) titleEl.innerText = `🏆 ${campaignName || "โหลดข้อมูล..."}`;
                document.title = campaignName ? `Tournament-Table | ${campaignName} Bracket` : "Tournament-Table | จัดการผล";
                window.currentPlayers = data.players || [];
                window.currentMatches = data.matches || {};
                window.renderZoneNav(window.currentPlayers.length);
                if (window.initBracket) window.initBracket(window.currentPlayers, window.currentMatches, window.currentZoneIdx);
            }
        });

        document.getElementById('saveBtn').onclick = async () => {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "⏳ กำลังบันทึก...";
            try {
                await updateDoc(doc(db, "tournaments", tourneyId), { matches: window.currentMatches, updatedAt: new Date() });
                alert("✅ บันทึกผลการแข่งขันเรียบร้อย!");
            } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); } finally { btn.innerText = "💾 บันทึกผล"; }
        };
    </script>
    <script src="script.js"></script>

        <!-- SPONSOR WHEEL ENHANCED -->
    <script>
    (function(){
        const KEY='g2_sponsors_v2';
        let sponsors=[],idx=0,timer=null,raf=null,t0=null,spd=4000;
        function load(){
            try{sponsors=JSON.parse(localStorage.getItem(KEY))||[];}catch(e){sponsors=[];}
            spd=parseInt(localStorage.getItem('g2_sp_spd'))||4000;
            const sl=document.getElementById('spInterval');if(sl)sl.value=spd;
        }
        function save(){localStorage.setItem(KEY,JSON.stringify(sponsors));localStorage.setItem('g2_sp_spd',spd);}
        function compress(file){return new Promise(res=>{
            const img=new Image(),url=URL.createObjectURL(file);
            img.onload=()=>{
                URL.revokeObjectURL(url);
                let{width:w,height:h}=img;const r=Math.min(400/w,220/h,1);w=Math.round(w*r);h=Math.round(h*r);
                const c=document.createElement('canvas');c.width=w;c.height=h;
                c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/webp',.88));
            };img.onerror=()=>{URL.revokeObjectURL(url);res(null);};img.src=url;
        });}
        function build(){
            const bar=document.getElementById('sponsorBar');if(!bar)return;
            if(!sponsors.length){bar.classList.add('hidden');clearInterval(timer);cancelAnimationFrame(raf);return;}
            bar.classList.remove('hidden');bar.innerHTML='';
            const prog=document.createElement('div');prog.id='spProgress';bar.appendChild(prog);
            sponsors.forEach((sp,i)=>{
                const s=document.createElement('div');s.className='sp-wheel-slide'+(i===0?' active':'');s.dataset.i=i;
                const img=document.createElement('img');img.src=sp.logo;img.draggable=false;
                const nm=document.createElement('div');nm.className='sp-wheel-name';nm.textContent=sp.name;
                s.append(img,nm);bar.appendChild(s);
            });
            if(sponsors.length>1){
                const dots=document.createElement('div');dots.className='sp-wheel-dots';
                sponsors.forEach((_,i)=>{
                    const d=document.createElement('div');d.className='sp-wheel-dot'+(i===0?' active':'');
                    d.onclick=()=>go(i,true);dots.appendChild(d);
                });bar.appendChild(dots);
            }
            idx=0;auto();
        }
        function go(next,manual=false){
            const slides=document.querySelectorAll('.sp-wheel-slide');
            const dots=document.querySelectorAll('.sp-wheel-dot');
            slides.forEach(s=>{if(+s.dataset.i===idx)s.classList.add('exit');s.classList.remove('active');});
            setTimeout(()=>{
                slides.forEach(s=>s.classList.remove('exit'));
                idx=(next+sponsors.length)%sponsors.length;
                slides.forEach(s=>{if(+s.dataset.i===idx)s.classList.add('active');});
                dots.forEach((d,i)=>d.classList.toggle('active',i===idx));
            },350);
            if(manual){clearInterval(timer);setTimeout(auto,spd);}
            prog();
        }
        function prog(){
            cancelAnimationFrame(raf);t0=performance.now();
            const el=document.getElementById('spProgress');if(!el||sponsors.length<=1)return;
            el.style.width='0%';
            const tick=ts=>{const p=Math.min(100,((ts-t0)/spd)*100);el.style.width=p+'%';if(p<100)raf=requestAnimationFrame(tick);};
            requestAnimationFrame(tick);
        }
        function auto(){clearInterval(timer);if(sponsors.length<=1){prog();return;}prog();timer=setInterval(()=>go(idx+1),spd);}
        function list(){
            const el=document.getElementById('spList');if(!el)return;el.innerHTML='';
            if(!sponsors.length){el.innerHTML='<p style="color:#555;font-size:12px;text-align:center">ยังไม่มีสปอนเซอร์</p>';return;}
            sponsors.forEach((sp,i)=>{
                const row=document.createElement('div');row.className='sp-item';
                const img=document.createElement('img');img.src=sp.logo;
                const nm=document.createElement('span');nm.textContent=sp.name;
                const del=document.createElement('button');del.className='sp-del';del.textContent='✕';
                del.onclick=()=>{sponsors.splice(i,1);save();build();list();};
                row.append(img,nm,del);el.append(row);
            });
        }
        window.openSponsorModal=()=>{list();document.getElementById('sponsorModal').classList.add('open');};
        window.closeSponsorModal=()=>{
            spd=parseInt(document.getElementById('spInterval').value)||4000;
            save();build();document.getElementById('sponsorModal').classList.remove('open');
        };
        document.addEventListener('DOMContentLoaded',()=>{
            const fi=document.getElementById('spFileInput');
            if(fi)fi.addEventListener('change',async e=>{
                for(const f of Array.from(e.target.files||[])){const logo=await compress(f);if(logo)sponsors.push({name:f.name.replace(/\.[^.]+$/,''),logo});}
                e.target.value='';save();list();build();
            });
            const m=document.getElementById('sponsorModal');
            if(m)m.addEventListener('click',e=>{if(e.target===m)closeSponsorModal();});
            load();build();
        });
    })();
    </script></body>
</html>
