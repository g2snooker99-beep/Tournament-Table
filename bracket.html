<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | จัดการผลการแข่ง</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button onclick="window.location.href='setup.html'" style="background:#333; color:white; padding:10px 20px; border-radius:10px; border:none; cursor:pointer;">⬅ กลับหน้าจัดสาย</button>
            <h2 id="tournamentTitle" style="margin:0; color:var(--accent);">🏆 กำลังโหลดข้อมูลสายแข่ง...</h2>
            <button id="saveBtn" class="btn-confirm">💾 บันทึกความคืบหน้า</button>
        </div>

        <div id="bracketWrapper">
            <div id="bracket" class="bracket-visual"></div>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, updateDoc, onSnapshot } from "./firebase-config.js?v=5";
        
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('id');

        if (!tourneyId) {
            alert("ไม่พบรหัสการแข่งขัน!");
            window.location.href = 'setup.html';
        }

        // โหลดข้อมูลแบบ Real-time
        onSnapshot(doc(db, "tournaments", tourneyId), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('tournamentTitle').innerText = data.campaignName || "จัดการผลการแข่งขัน";
                renderBracket(data.players, data.matches || {});
            }
        });

        function renderBracket(players, matches) {
            // โค้ดส่วนนี้จะทำงานร่วมกับ logic ใน script.js เพื่อวาดสายแข่ง
            // ผมจะฝัง logic การวาดไว้ใน script.js ให้รองรับ tournamentId
            window.currentTournamentData = { players, matches };
            if (typeof window.initBracket === 'function') {
                window.initBracket(players, matches);
            }
        }

        document.getElementById('saveBtn').onclick = async () => {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "⏳ กำลังบันทึก...";
            try {
                await updateDoc(doc(db, "tournaments", tourneyId), {
                    matches: window.currentMatches,
                    updatedAt: new Date()
                });
                alert("✅ บันทึกผลการแข่งขันเรียบร้อย!");
            } catch (e) {
                alert("เกิดข้อผิดพลาด: " + e.message);
            } finally {
                btn.innerText = "💾 บันทึกความคืบหน้า";
            }
        };
    </script>
    <script src="script.js?v=5"></script>
</body>
</html>
