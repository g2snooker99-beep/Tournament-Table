<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🎱 Tournament Table Generator</h2>
        
        <div class="setup-section">
            <label>จำนวนผู้สมัคร (คน):</label>
            <div class="input-group">
                <input type="number" id="playerCount" value="16" min="2" max="128">
                <button onclick="generateInputFields()">ยืนยันจำนวน</button>
            </div>
        </div>

        <div id="playerInputs" style="display: none;">
            <h3>รายชื่อผู้เข้าแข่งขัน</h3>
            <div id="nameFields"></div>
            <button class="btn-generate" onclick="generateBracket()">สร้างสายการแข่งขัน (สุ่มจับคู่)</button>
        </div>

        <div id="result" class="box" style="display:none;"></div>
        <button id="saveBtn" class="btn-save" style="display:none;" onclick="saveToFirebase()">💾 Save to Firebase</button>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
