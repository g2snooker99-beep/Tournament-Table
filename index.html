<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G2 Tournament - Entry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🎱 G2 Snooker Tournament</h2>
        <p style="text-align:center;">ระบุจำนวนผู้สมัครและรายชื่อเพื่อเริ่มจัดการแข่งขัน</p>
        
        <div class="input-group">
            <input type="number" id="playerCount" value="16" min="2">
            <button class="btn-confirm" onclick="generateInputFields()">ยืนยันจำนวน</button>
        </div>

        <div id="playerInputs" style="display: none;">
            <div id="autoFillArea" style="text-align:center; margin-bottom:15px;"></div>
            <div id="nameFields"></div>
            <button class="btn-generate" onclick="saveAndGoToBracket()" id="saveBtn">💾 บันทึกและสร้างสายการแข่งขัน</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "tournament-table-45dca.firebaseapp.com",
            projectId: "tournament-table-45dca",
            storageBucket: "tournament-table-45dca.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.dbFunctions = { collection, addDoc };
    </script>
    <script src="script.js"></script>
</body>
</html>
