<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | Setup Hub</title>
    <link rel="stylesheet" href="style.css?v=grandlux">
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 id="setupPageTitle" style="text-align: center; font-size: 2.2em; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px;">
                🎯 การจัดการสายแข่ง (Setup Hub)
            </h2>
            <p id="setupPageSubtitle" style="color:var(--text-dim); margin:0;">เลือกรายการแข่งขันเพื่อเริ่มจัดสายและอัปเดตผล</p>
        </div>
        
        <div style="text-align: center; margin-bottom: 25px;">
            <button onclick="window.location.href='dashboard.html'" style="background:rgba(255,255,255,0.1); color:white; padding:10px 20px; border-radius:12px; border:1px solid var(--glass-border); cursor:pointer;">
                ⬅ กลับแผงควบคุมแอดมิน
            </button>
        </div>

        <div class="form-container" style="margin-bottom:25px; max-width: 800px;">
            <label style="color:var(--accent); font-weight:bold; display:block; margin-bottom:10px;">เลือกรายการแข่งขัน:</label>
            <select id="campaignSelectSetup" class="campaign-selector" style="width:100%;" onchange="checkExistingSetup()">
                <option value="">-- กำลังโหลดรายการแข่งขัน... --</option>
            </select>
            <div id="syncStatus" style="font-size: 0.85em; color: var(--text-dim); margin-top:10px;"></div>
        </div>

        <div id="campaignEditor" class="form-container" style="display:none; margin-bottom:25px; max-width: 800px; border-left: 4px solid var(--gold);">
            <div style="margin-bottom:18px;">
                <h3 id="campaignEditTitle" style="margin:0; color:var(--gold);">✏️ แก้ไขรายละเอียดรายการแข่งขัน</h3>
                <p style="margin:8px 0 0; color:var(--text-dim);">แก้ไขข้อความและรูปภาพของรายการแข่งขันได้จากตรงนี้</p>
            </div>

            <form id="campaignEditForm">
                <div class="form-group">
                    <label>ชื่อรายการแข่งขัน *</label>
                    <input type="text" id="editTourneyName" required>
                </div>

                <div class="form-group">
                    <label>กติกาของรายการแข่งขัน *</label>
                    <textarea id="editTourneyRules" required></textarea>
                </div>

                <div class="form-group">
                    <label>ราคาค่าสมัคร (บาท) *</label>
                    <input type="number" id="editEntryFee" min="0" required>
                </div>

                <div class="form-group">
                    <label>รางวัลการแข่งขัน</label>
                    <textarea id="editTourneyPrize" placeholder="เช่น แชมป์ 10,000 บาท&#10;รองแชมป์ 5,000 บาท"></textarea>
                </div>

                <div class="form-group">
                    <label>รูปภาพแบนเนอร์รายการ</label>
                    <input type="file" id="editBannerImage" accept="image/*">
                    <label style="display:flex; align-items:center; gap:8px; color:var(--text-dim); text-transform:none; letter-spacing:0; margin-top:10px;">
                        <input type="checkbox" id="removeBannerImage" style="width:auto;"> ลบรูปแบนเนอร์เดิม
                    </label>
                    <img id="editBannerPreview" style="display:none; width:100%; max-height:220px; object-fit:contain; margin-top:12px; border-radius:12px; background:#10141a; padding:10px;" alt="Banner preview">
                </div>

                <div class="form-group">
                    <label>รูปแบบเสื้อแข่งขัน</label>
                    <input type="file" id="editJerseyImage" accept="image/*">
                    <label style="display:flex; align-items:center; gap:8px; color:var(--text-dim); text-transform:none; letter-spacing:0; margin-top:10px;">
                        <input type="checkbox" id="removeJerseyImage" style="width:auto;"> ลบรูปเสื้อเดิม
                    </label>
                    <img id="editJerseyPreview" style="display:none; width:100%; max-height:220px; object-fit:contain; margin-top:12px; border-radius:12px; background:#10141a; padding:10px;" alt="Jersey preview">
                </div>

                <div class="form-group">
                    <label>รูปตารางไซส์เสื้อ</label>
                    <input type="file" id="editSizeChartImage" accept="image/*">
                    <label style="display:flex; align-items:center; gap:8px; color:var(--text-dim); text-transform:none; letter-spacing:0; margin-top:10px;">
                        <input type="checkbox" id="removeSizeChartImage" style="width:auto;"> ลบรูปตารางไซส์เดิม
                    </label>
                    <img id="editSizeChartPreview" style="display:none; width:100%; max-height:260px; object-fit:contain; margin-top:12px; border-radius:12px; background:#10141a; padding:10px;" alt="Size chart preview">
                </div>

                <button type="submit" id="saveCampaignEditBtn" class="btn-confirm" style="width:100%; font-size:1.05em;">💾 บันทึกการแก้ไขรายการแข่งขัน</button>
            </form>
        </div>

        <div id="setupArea" style="display:none;">
            <div class="form-container" style="margin-bottom:25px; max-width: 800px; border-left: 4px solid var(--accent);">
                <h3 style="margin-top:0; color:var(--accent);">📥 เครื่องมือดึงรายชื่อ</h3>
                <div style="display:flex; gap:10px;">
                    <button id="fetchBtn" class="btn-confirm" style="flex:1;">สุ่มเติมรายชื่อจากยอดสมัคร</button>
                    <button onclick="clearAllInputs()" style="background:rgba(220, 53, 69, 0.1); color:#dc3545; border:1px solid #dc3545; padding:10px; border-radius:8px; cursor:pointer;">ล้างกระดาน</button>
                </div>
            </div>

            <div class="form-container" style="max-width: 800px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="margin:0;">📝 รายชื่อในตาราง</h3>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>จำนวนช่อง:</span>
                        <input type="number" id="playerCount" value="32" min="2" style="width:70px; text-align:center;" onchange="generateInputFields()">
                    </div>
                </div>

                <div id="playerInputs">
                    <div id="autoFillArea" style="display:none;"></div>
                    <div style="text-align: right; margin-bottom: 15px;">
                        <button onclick="shuffleInputs()" style="background: linear-gradient(135deg, #f39c12 0%, #d68910 100%); color: #000; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4); font-size: 1.1em; transition: 0.2s;">🔀 สลับตำแหน่งสายแข่ง (Shuffle)</button>
                    </div>
                    <div id="nameFields" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                    <button class="btn-generate" onclick="saveAndGoToBracket()" id="saveBtn">💾 บันทึกและอัปเดตสายการแข่งขัน</button>
                    <button id="resetTourneyBtn" onclick="resetTournamentData()" style="background: linear-gradient(135deg, #dc3545 0%, #a71d2a 100%); width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(220, 53, 69, 0.4); margin-top: 15px;">🗑️ ล้างผลการแข่งทั้งหมด (Reset เริ่มใหม่)</button>
                    <button id="deleteCampaignBtn" onclick="deleteCampaignCompletely()" style="background: linear-gradient(135deg, #6f1d1b 0%, #3d0c0a 100%); width: 100%; padding: 15px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: white; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(111, 29, 27, 0.45); margin-top: 15px;">🔥 ลบรายการแข่งขันนี้ทั้งหมด</button>
                </div>
            </div>
        </div>

        <div id="linkDisplayArea" style="display:none; margin-top:25px;" class="info-box">
            <h3 style="color:var(--status-success); margin-top:0;">✅ อัปเดตข้อมูลสำเร็จ</h3>
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:12px;">
                <p>🔗 <b>Admin Link (จัดการผล):</b></p>
                <a id="adminUrl" href="#" target="_blank" style="color:var(--accent); word-break:break-all; font-weight:bold; text-decoration: underline; display: inline-block;"></a>
                <p style="margin-top:15px;">📺 <b>Live Link (โชว์บนจอ):</b></p>
                <a id="liveUrl" href="#" target="_blank" style="color:var(--accent); word-break:break-all; font-weight:bold; text-decoration: underline; display: inline-block;"></a>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDoc, getDocs, updateDoc, deleteDoc, doc, query, where, onSnapshot } from "./firebase-config.js?v=4";
        window.db = db;
        window.dbFunctions = { db, collection, addDoc, getDoc, getDocs, updateDoc, doc, query, where, onSnapshot };

        let currentCampaignData = null;
        const urlParams = new URLSearchParams(window.location.search);
        const preselectedCampaignId = urlParams.get('campaign');

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 1200;
                    if (w > h && w > max) { h *= max / w; w = max; }
                    else if (h > max) { w *= max / h; h = max; }
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.onerror = reject;
        });

        function setImagePreview(previewId, src) {
            const img = document.getElementById(previewId);
            if (src) {
                img.src = src;
                img.style.display = 'block';
            } else {
                img.removeAttribute('src');
                img.style.display = 'none';
            }
        }

        function populateCampaignEditor(data = {}) {
            document.getElementById('editTourneyName').value = data.name || '';
            document.getElementById('editTourneyRules').value = data.rules || '';
            document.getElementById('editEntryFee').value = data.fee || '';
            document.getElementById('editTourneyPrize').value = data.prize || '';

            document.getElementById('removeBannerImage').checked = false;
            document.getElementById('removeJerseyImage').checked = false;
            document.getElementById('removeSizeChartImage').checked = false;

            setImagePreview('editBannerPreview', data.bannerImg || '');
            setImagePreview('editJerseyPreview', data.jerseyImg || '');
            setImagePreview('editSizeChartPreview', data.sizeChartImg || '');

            document.getElementById('campaignEditTitle').innerText = `✏️ แก้ไขรายละเอียด: ${data.name || 'รายการแข่งขัน'}`;
        }

        async function loadCampaignEditor(cid) {
            const editor = document.getElementById('campaignEditor');
            if (!cid) {
                currentCampaignData = null;
                editor.style.display = 'none';
                return;
            }

            try {
                const snap = await getDoc(doc(db, "campaigns", cid));
                if (!snap.exists()) {
                    currentCampaignData = null;
                    editor.style.display = 'none';
                    return;
                }

                currentCampaignData = snap.data();
                populateCampaignEditor(currentCampaignData);
                editor.style.display = 'block';
            } catch (e) {
                console.error(e);
                editor.style.display = 'none';
            }
        }

        function bindImageInputPreview(inputId, previewId, removeId, dataKey) {
            const input = document.getElementById(inputId);
            const removeToggle = document.getElementById(removeId);

            input.addEventListener('change', () => {
                const file = input.files[0];
                if (!file) {
                    if (!removeToggle.checked && currentCampaignData) {
                        setImagePreview(previewId, currentCampaignData[dataKey] || '');
                    }
                    return;
                }
                removeToggle.checked = false;
                const reader = new FileReader();
                reader.onload = (e) => setImagePreview(previewId, e.target.result);
                reader.readAsDataURL(file);
            });

            removeToggle.addEventListener('change', () => {
                if (removeToggle.checked) {
                    input.value = '';
                    setImagePreview(previewId, '');
                } else if (currentCampaignData) {
                    setImagePreview(previewId, currentCampaignData[dataKey] || '');
                }
            });
        }

        async function loadCampaigns() {
            const select = document.getElementById('campaignSelectSetup');
            try {
                const querySnapshot = await getDocs(collection(db, "campaigns"));
                select.innerHTML = '<option value="">-- เลือกรายการแข่งขัน --</option>';
                querySnapshot.forEach((doc) => { select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`; });
            } catch (e) { console.error(e); }
        }

        window.updateSetupHeading = (campaignName = "") => {
            const title = document.getElementById('setupPageTitle');
            const subtitle = document.getElementById('setupPageSubtitle');

            if (campaignName) {
                title.innerText = `🎯 จัดการสายแข่ง: ${campaignName}`;
                subtitle.innerText = `จัดสาย บันทึกผล และสร้างลิงก์ถ่ายทอดสดสำหรับรายการ ${campaignName}`;
                document.title = `Tournament-Table | ${campaignName} Setup`;
            } else {
                title.innerText = "🎯 การจัดการสายแข่ง (Setup Hub)";
                subtitle.innerText = "เลือกรายการแข่งขันเพื่อเริ่มจัดสายและอัปเดตผล";
                document.title = "Tournament-Table | Setup Hub";
            }
        };

        window.checkExistingSetup = async () => {
            const select = document.getElementById('campaignSelectSetup');
            const cid = select.value;
            const campaignName = select.selectedOptions?.[0]?.text || "";
            const setupArea = document.getElementById('setupArea');
            const syncStatus = document.getElementById('syncStatus');
            
            if (!cid) {
                updateSetupHeading();
                setupArea.style.display = 'none';
                document.getElementById('linkDisplayArea').style.display = 'none';
                await loadCampaignEditor("");
                return;
            }
            
            updateSetupHeading(campaignName);
            await loadCampaignEditor(cid);
            setupArea.style.display = 'block';
            syncStatus.innerText = "⏳ กำลังดึงข้อมูลล่าสุด...";

            const q = query(collection(db, "tournaments"), where("campaignId", "==", cid));
            const snap = await getDocs(q);
            
            if (!snap.empty) {
                const tourneyDoc = snap.docs[0];
                const tourney = tourneyDoc.data();
                
                document.getElementById('playerCount').value = tourney.players.length;
                window.generateInputFields();
                
                const inputs = document.querySelectorAll('.playerName');
                tourney.players.forEach((p, i) => { if(inputs[i]) inputs[i].value = p.name || ""; });
                syncStatus.innerHTML = "✅ โหลดสถานะล่าสุดจากฐานข้อมูลแล้ว";

                const base = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                const adminLink = `${base}bracket.html?id=${tourneyDoc.id}`;
                const liveLink = `${base}live.html?id=${tourneyDoc.id}`;

                if (document.getElementById('adminUrl')) {
                    document.getElementById('adminUrl').innerText = adminLink;
                    document.getElementById('adminUrl').href = adminLink;
                }
                if (document.getElementById('liveUrl')) {
                    document.getElementById('liveUrl').innerText = liveLink;
                    document.getElementById('liveUrl').href = liveLink;
                }
                document.getElementById('linkDisplayArea').style.display = 'block';

            } else {
                syncStatus.innerHTML = "✨ รายการใหม่ (ยังไม่มีการจัดสาย)";
                window.generateInputFields();
                document.getElementById('linkDisplayArea').style.display = 'none'; 
            }
        };

        window.deleteCampaignCompletely = async () => {
            const select = document.getElementById('campaignSelectSetup');
            const cid = select.value;
            if (!cid) {
                alert("กรุณาเลือกรายการแข่งขันก่อน");
                return;
            }

            const campaignName = select.selectedOptions?.[0]?.text || "รายการนี้";
            if (!confirm(`ต้องการลบ "${campaignName}" ทั้งหมดใช่หรือไม่?\nข้อมูลผู้สมัคร สายแข่ง และลิงก์ที่เกี่ยวข้องจะถูกลบถาวร`)) {
                return;
            }

            const btn = document.getElementById('deleteCampaignBtn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "⏳ กำลังลบรายการแข่งขัน...";

            try {
                const regSnap = await getDocs(query(collection(db, "registrations"), where("campaignId", "==", cid)));
                for (const regDoc of regSnap.docs) {
                    await deleteDoc(doc(db, "registrations", regDoc.id));
                }

                const tourneySnap = await getDocs(query(collection(db, "tournaments"), where("campaignId", "==", cid)));
                for (const tourneyDoc of tourneySnap.docs) {
                    await deleteDoc(doc(db, "tournaments", tourneyDoc.id));
                }

                await deleteDoc(doc(db, "campaigns", cid));

                document.getElementById('setupArea').style.display = 'none';
                document.getElementById('linkDisplayArea').style.display = 'none';
                document.getElementById('syncStatus').innerText = '';
                select.value = '';

                await loadCampaigns();
                alert("✅ ลบรายการแข่งขันและข้อมูลที่เกี่ยวข้องทั้งหมดเรียบร้อย");
            } catch (e) {
                alert("❌ " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        };

        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const cid = document.getElementById('campaignSelectSetup').value;
            if (!cid) return;

            const btn = document.getElementById('fetchBtn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ กำลังเติมรายชื่อ...";

            try {
                const q = query(collection(db, "registrations"), where("campaignId", "==", cid), where("status", "==", "approved"));
                const snap = await getDocs(q);

                let players = [];
                snap.forEach((d) => {
                    const name = d.data().playerName?.trim();
                    if (name) players.push(name);
                });

                if (players.length === 0) { alert("ไม่พบรายชื่อที่อนุมัติ"); return; }

                const zonesNeeded = Math.ceil(players.length / 32) || 1;
                const totalSlots = zonesNeeded * 32;
                const byeCount = totalSlots - players.length;

                for (let i = players.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [players[i], players[j]] = [players[j], players[i]];
                }

                document.getElementById('playerCount').value = totalSlots;
                window.generateInputFields();

                const inputs = Array.from(document.querySelectorAll('.playerName'));

                players.forEach((name, i) => {
                    if (inputs[i]) {
                        inputs[i].value = name;
                        inputs[i].style.borderColor = "var(--status-success)";
                        setTimeout(() => { inputs[i].style.borderColor = ""; }, 1200);
                    }
                });

                for (let i = players.length; i < totalSlots; i++) {
                    if (inputs[i]) {
                        inputs[i].value = 'BYE';
                        inputs[i].style.color = '#446';
                        inputs[i].style.fontStyle = 'italic';
                        inputs[i].style.background = 'rgba(0,0,0,0.2)';
                    }
                }

                if (byeCount > 0) {
                    alert(`✅ เติมรายชื่อ \${players.length} คนเรียบร้อย\n📋 เพิ่ม BYE อัตโนมัติ \${byeCount} ช่อง (รวม \${totalSlots} slots)`);
                } else {
                    alert(`✅ เติมรายชื่อ \${players.length} คนเรียบร้อย`);
                }

            } catch (e) {
                alert(e.message);
            } finally {
                btn.innerText = originalText;
            }
        });


        window.clearAllInputs = () => { if(confirm("ล้างชื่อทั้งหมด?")) document.querySelectorAll('.playerName').forEach(i => i.value = ""); };

        bindImageInputPreview('editBannerImage', 'editBannerPreview', 'removeBannerImage', 'bannerImg');
        bindImageInputPreview('editJerseyImage', 'editJerseyPreview', 'removeJerseyImage', 'jerseyImg');
        bindImageInputPreview('editSizeChartImage', 'editSizeChartPreview', 'removeSizeChartImage', 'sizeChartImg');

        document.getElementById('campaignEditForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const cid = document.getElementById('campaignSelectSetup').value;
            if (!cid) {
                alert("กรุณาเลือกรายการแข่งขันก่อน");
                return;
            }

            const btn = document.getElementById('saveCampaignEditBtn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "⏳ กำลังบันทึกการแก้ไข...";

            try {
                const existing = currentCampaignData || {};
                const name = document.getElementById('editTourneyName').value.trim();
                const rules = document.getElementById('editTourneyRules').value.trim();
                const fee = document.getElementById('editEntryFee').value;
                const prize = document.getElementById('editTourneyPrize').value.trim();

                const bannerFile = document.getElementById('editBannerImage').files[0];
                const jerseyFile = document.getElementById('editJerseyImage').files[0];
                const sizeChartFile = document.getElementById('editSizeChartImage').files[0];

                const payload = {
                    name,
                    rules,
                    fee,
                    prize,
                    bannerImg: bannerFile
                        ? await fileToBase64(bannerFile)
                        : (document.getElementById('removeBannerImage').checked ? null : (existing.bannerImg || null)),
                    jerseyImg: jerseyFile
                        ? await fileToBase64(jerseyFile)
                        : (document.getElementById('removeJerseyImage').checked ? null : (existing.jerseyImg || null)),
                    sizeChartImg: sizeChartFile
                        ? await fileToBase64(sizeChartFile)
                        : (document.getElementById('removeSizeChartImage').checked ? null : (existing.sizeChartImg || null)),
                    updatedAt: new Date().toISOString()
                };

                await updateDoc(doc(db, "campaigns", cid), payload);

                const tourneySnap = await getDocs(query(collection(db, "tournaments"), where("campaignId", "==", cid)));
                for (const tourneyDoc of tourneySnap.docs) {
                    await updateDoc(doc(db, "tournaments", tourneyDoc.id), {
                        campaignName: payload.name,
                        updatedAt: new Date()
                    });
                }

                currentCampaignData = { ...existing, ...payload };

                await loadCampaigns();
                document.getElementById('campaignSelectSetup').value = cid;
                updateSetupHeading(payload.name);
                populateCampaignEditor(currentCampaignData);
                document.getElementById('syncStatus').innerText = "✅ อัปเดตรายละเอียดรายการแข่งขันแล้ว";

                alert("✅ บันทึกการแก้ไขเรียบร้อย");
            } catch (e) {
                alert("❌ " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });

        window.onload = async () => {
            await loadCampaigns();

            const select = document.getElementById('campaignSelectSetup');
            if (preselectedCampaignId && Array.from(select.options).some((option) => option.value === preselectedCampaignId)) {
                select.value = preselectedCampaignId;
                await window.checkExistingSetup();
                return;
            }

            updateSetupHeading();
        };
    </script>
    <script src="script.js?v=4"></script>
</body>
</html>
