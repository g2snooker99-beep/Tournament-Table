<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | จัดสายการแข่งขัน</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🏆 จัดสายการแข่งขัน (Setup)</h2>
        <button onclick="window.location.href='index.html'" style="background:#444; color:white; padding:5px 10px; border-radius:5px; margin-bottom:15px; cursor:pointer;">⬅ กลับหน้าแรก</button>

        <div style="background:#222; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);">
            <h3 style="margin-top:0; color:#00d4ff;">📥 ดึงรายชื่อจากระบบรับสมัครอัตโนมัติ</h3>
            <div style="display:flex; gap:10px;">
                <select id="campaignSelectSetup" style="flex:1; padding:10px; border-radius:5px; background:#333; color:white; border:1px solid #555;">
                    <option value="">-- กำลังโหลดรายการแข่งขัน... --</option>
                </select>
                <button id="fetchBtn" style="background:#28a745; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">ดึงรายชื่อ</button>
            </div>
        </div>

        <hr style="border-color:#444; margin:20px 0;">

        <div id="setupArea">
            <p style="text-align:center; color:#aaa;">หรือ ระบุจำนวนและพิมพ์ชื่อเองแบบ Manual</p>
            <div class="input-group">
                <input type="number" id="playerCount" value="16" min="2">
                <button class="btn-confirm" onclick="generateInputFields()">ยืนยันจำนวน</button>
            </div>

            <div id="playerInputs" style="display: none;">
                <div id="autoFillArea" style="text-align:center; margin-bottom:15px;"></div>
                <div id="nameFields"></div>
                <button class="btn-generate" onclick="saveAndGoToBracket()" id="saveBtn">💾 สร้างและบันทึกสายการแข่งขัน</button>
            </div>
        </div>

        <div id="linkDisplayArea" style="display:none;" class="link-box">
            <h3 style="color:#00d4ff; margin-top:0;">✅ สร้างทัวร์นาเมนต์สำเร็จ</h3>
            <p>🔗 <b>Admin Link (สำหรับจัดการผล):</b></p>
            <span id="adminUrl" class="url-text"></span>
            <p>📺 <b>Live Link (สำหรับลูกค้าดูผล):</b></p>
            <span id="liveUrl" class="url-text"></span>
            
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="window.location.reload()" style="background:#444;">สร้างรายการใหม่</button>
                <button id="goToAdminBtn" class="btn-confirm">ไปหน้าแอดมิน ➔</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // *** ⚠️ อย่าลืมแก้ API KEY ให้ตรงกับโปรเจกต์ของคุณนะครับ ***
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            authDomain: "tournament-table-45dca.firebaseapp.com",
            projectId: "tournament-table-45dca",
            storageBucket: "tournament-table-45dca.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.dbFunctions = { collection, addDoc };

        // โหลดรายชื่อรายการแข่งมาใส่ Dropdown
        async function loadCampaigns() {
            const select = document.getElementById('campaignSelectSetup');
            try {
                const querySnapshot = await getDocs(collection(window.db, "campaigns"));
                select.innerHTML = '<option value="">-- เลือกรายการที่ต้องการดึงรายชื่อ --</option>';
                querySnapshot.forEach((doc) => {
                    select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
                });
            } catch (error) {
                console.error("Error loading campaigns: ", error);
            }
        }

        // ฟังก์ชันดึงชื่อคนที่ "อนุมัติแล้ว"
        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const cid = document.getElementById('campaignSelectSetup').value;
            const btn = document.getElementById('fetchBtn');
            if (!cid) return alert("กรุณาเลือกรายการแข่งขันก่อนครับ");

            btn.innerText = "⏳ กำลังดึง...";
            try {
                const q = query(collection(window.db, "registrations"), where("campaignId", "==", cid), where("status", "==", "approved"));
                const snapshot = await getDocs(q);
                
                let players = [];
                snapshot.forEach(doc => { players.push(doc.data().playerName); });

                if (players.length < 2) {
                    alert(`ต้องการผู้อนุมัติอย่างน้อย 2 คน (ตอนนี้มี ${players.length} คน) กรุณาไปอนุมัติในหน้า Dashboard ก่อนครับ`);
                    btn.innerText = "ดึงรายชื่อ";
                    return;
                }

                // 1. ตั้งค่าจำนวนคนแข่งให้เท่ากับคนที่ดึงมาได้
                document.getElementById('playerCount').value = players.length;
                
                // 2. สั่งให้วาดกล่อง input
                window.generateInputFields();

                // 3. หยอดชื่อที่ดึงมาใส่ลงไปในกล่องแต่ละใบ
                const inputs = document.querySelectorAll('.playerName');
                players.forEach((name, index) => {
                    if(inputs[index]) inputs[index].value = name;
                });

                alert(`✅ ดึงรายชื่อสำเร็จ ${players.length} คน! ตรวจสอบความถูกต้องและกด "สร้างสายการแข่งขัน" ด้านล่างได้เลยครับ`);
                btn.innerText = "ดึงรายชื่อ";

            } catch (e) {
                alert("เกิดข้อผิดพลาด: " + e.message);
                btn.innerText = "ดึงรายชื่อ";
            }
        });

        // รันฟังก์ชันทันทีที่เปิดหน้า
        window.onload = loadCampaigns;
    </script>
    <script src="script.js"></script>
</body>
</html>
