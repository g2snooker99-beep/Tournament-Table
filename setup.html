<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | Setup Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; font-size: 2.2em; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px;">
            🎯 การจัดการสายแข่ง (Setup Hub)
        </h2>
        
        <div style="text-align: center; margin-bottom: 25px;">
            <button onclick="window.location.href='dashboard.html'" style="background:rgba(255,255,255,0.1); color:white; padding:10px 20px; border-radius:12px; border:1px solid var(--glass-border); cursor:pointer;">
                ⬅ กลับแผงควบคุมแอดมิน
            </button>
        </div>

        <div class="form-container" style="margin-bottom:25px; max-width: 800px;">
            <label style="color:var(--accent); font-weight:bold; display:block; margin-bottom:10px;">เลือกรายการแข่งขัน:</label>
            <select id="campaignSelectSetup" class="campaign-selector" style="width:100%;" onchange="checkExistingSetup()">
                <option value="">-- กำลังโหลดรายการแข่งขัน... --</option>
            </select>
            <div id="syncStatus" style="font-size: 0.85em; color: var(--text-dim); margin-top:10px;"></div>
        </div>

        <div id="setupArea" style="display:none;">
            <div class="form-container" style="margin-bottom:25px; max-width: 800px; border-left: 4px solid var(--accent);">
                <h3 style="margin-top:0; color:var(--accent);">📥 เครื่องมือดึงรายชื่อ</h3>
                <div style="display:flex; gap:10px;">
                    <button id="fetchBtn" class="btn-confirm" style="flex:1;">สุ่มรายชื่อจากยอดสมัคร (Randomize)</button>
                    <button onclick="clearAllInputs()" style="background:rgba(220, 53, 69, 0.1); color:#dc3545; border:1px solid #dc3545; padding:10px; border-radius:8px; cursor:pointer;">ล้างกระดาน</button>
                </div>
            </div>

            <div class="form-container" style="max-width: 800px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="margin:0;">📝 รายชื่อในตาราง</h3>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>จำนวนช่อง:</span>
                        <input type="number" id="playerCount" value="32" min="2" style="width:70px; text-align:center;" onchange="generateInputFields()">
                    </div>
                </div>

                <div id="playerInputs">
                    <div id="autoFillArea" style="display:none;"></div>
<div style="text-align: right; margin-bottom: 15px;">
    <button onclick="shuffleInputs()" style="background: linear-gradient(135deg, #f39c12 0%, #d68910 100%); color: #000; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4); font-size: 1.1em; transition: 0.2s;">🔀 สลับตำแหน่งสายแข่ง (Shuffle)</button>
</div>
                    <div id="nameFields" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                    <button class="btn-generate" onclick="saveAndGoToBracket()" id="saveBtn">💾 บันทึกและอัปเดตสายการแข่งขัน</button>
                </div>
            </div>
        </div>

        <div id="linkDisplayArea" style="display:none; margin-top:25px;" class="info-box">
            <h3 style="color:var(--status-success); margin-top:0;">✅ อัปเดตข้อมูลสำเร็จ</h3>
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:12px;">
                <p>🔗 <b>Admin Link (จัดการผล):</b></p>
                <span id="adminUrl" style="color:var(--accent); word-break:break-all; font-weight:bold;"></span>
                <p style="margin-top:15px;">📺 <b>Live Link (โชว์บนจอ):</b></p>
                <span id="liveUrl" style="color:var(--accent); word-break:break-all; font-weight:bold;"></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDoc, getDocs, updateDoc, doc, query, where, onSnapshot } from "./firebase-config.js?v=4";
        window.db = db;
        window.dbFunctions = { db, collection, addDoc, getDoc, getDocs, updateDoc, doc, query, where, onSnapshot };

        async function loadCampaigns() {
            const select = document.getElementById('campaignSelectSetup');
            try {
                const querySnapshot = await getDocs(collection(db, "campaigns"));
                select.innerHTML = '<option value="">-- เลือกรายการแข่งขัน --</option>';
                querySnapshot.forEach((doc) => { select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`; });
            } catch (e) { console.error(e); }
        }

        window.checkExistingSetup = async () => {
            const cid = document.getElementById('campaignSelectSetup').value;
            const setupArea = document.getElementById('setupArea');
            const syncStatus = document.getElementById('syncStatus');
            if (!cid) { setupArea.style.display = 'none'; return; }
            setupArea.style.display = 'block';
            syncStatus.innerText = "⏳ กำลังดึงข้อมูลล่าสุด...";

            const q = query(collection(db, "tournaments"), where("campaignId", "==", cid));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const tourney = snap.docs[0].data();
                document.getElementById('playerCount').value = tourney.players.length;
                window.generateInputFields();
                const inputs = document.querySelectorAll('.playerName');
                tourney.players.forEach((p, i) => { if(inputs[i]) inputs[i].value = p.name || ""; });
                syncStatus.innerHTML = "✅ โหลดสถานะล่าสุดจากฐานข้อมูลแล้ว";
            } else {
                syncStatus.innerHTML = "✨ รายการใหม่ (ยังไม่มีการจัดสาย)";
                window.generateInputFields();
            }
        };

        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const cid = document.getElementById('campaignSelectSetup').value;
            if (!cid) return;
            const btn = document.getElementById('fetchBtn');
            btn.innerText = "⏳ กำลังสุ่มรายชื่อ...";
            try {
                const q = query(collection(db, "registrations"), where("campaignId", "==", cid), where("status", "==", "approved"));
                const snap = await getDocs(q);
                let players = [];
                snap.forEach(d => { players.push(d.data().playerName); });
                if (players.length === 0) { alert("ไม่พบรายชื่อที่อนุมัติ"); btn.innerText = "สุ่มรายชื่อจากยอดสมัคร"; return; }
                
                // Shuffle
                for (let i = players.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [players[i], players[j]] = [players[j], players[i]];
                }

                const inputs = document.querySelectorAll('.playerName');
                inputs.forEach(input => input.value = "");
                players.forEach((name, i) => { if(inputs[i]) inputs[i].value = name; });
                btn.innerText = "สุ่มรายชื่อจากยอดสมัคร (Randomize)";
            } catch (e) { alert(e.message); }
        });

        window.clearAllInputs = () => { if(confirm("ล้างชื่อทั้งหมด?")) document.querySelectorAll('.playerName').forEach(i => i.value = ""); };
        window.onload = loadCampaigns;
    </script>
    <script src="script.js?v=4"></script>
</body>
</html>
