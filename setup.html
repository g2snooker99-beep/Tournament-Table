<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | จัดสายการแข่งขัน</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; font-size: 2em; text-transform: uppercase; letter-spacing: 2px;">🏆 จัดสายการแข่งขัน (Setup)</h2>
        <div style="text-align: center; margin-bottom: 25px;">
            <button onclick="window.location.href='dashboard.html'" style="background:#333; color:white; padding:8px 15px; border-radius:8px; border:1px solid #555; cursor:pointer;">⬅ กลับแผงควบคุมแอดมิน</button>
        </div>

        <div id="setupArea">
            <div class="form-container" style="margin-bottom:25px;">
                <h3 style="margin-top:0; color:var(--accent);">📥 ดึงรายชื่อจากระบบรับสมัครอัตโนมัติ</h3>
                <div style="display:flex; gap:10px;">
                    <select id="campaignSelectSetup" style="flex:1; padding:12px; border-radius:10px; background:rgba(0,0,0,0.5); color:white; border:1px solid var(--glass-border); font-family:inherit;">
                        <option value="">-- กำลังโหลดรายการแข่งขัน... --</option>
                    </select>
                    <button id="fetchBtn" class="btn-confirm" style="padding:10px 20px;">ดึงรายชื่อ</button>
                </div>
            </div>

            <div class="form-container">
                <p style="text-align:center; color:var(--text-dim); margin-top:0;">ตั้งค่าจำนวน "ช่อง" ทั้งหมดที่ต้องการ (เช่น 32, 64)</p>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="number" id="playerCount" value="32" min="2" style="flex:1;">
                    <button class="btn-confirm" onclick="generateInputFields()">ยืนยันจำนวนช่อง</button>
                </div>

                <div id="playerInputs" style="display: none;">
                    <div id="autoFillArea" style="text-align:center; margin-bottom:15px;"></div>
                    <div id="nameFields"></div>
                    <button class="btn-generate" onclick="saveAndGoToBracket()" id="saveBtn">🎲 สุ่มและสร้างสายการแข่งขัน</button>
                </div>
            </div>
        </div>

        <div id="linkDisplayArea" style="display:none; margin-top:25px;" class="info-box">
            <h3 style="color:var(--status-success); margin-top:0;">✅ สร้างทัวร์นาเมนต์สำเร็จ</h3>
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:12px; border:1px solid var(--glass-border);">
                <p>🔗 <b>Admin Link (สำหรับจัดการผล):</b></p>
                <span id="adminUrl" style="color:var(--accent); word-break:break-all; font-weight:bold; display:block; margin:10px 0;"></span>
                <p style="margin-top:20px;">📺 <b>Live Link (สำหรับลูกค้าดูผล):</b></p>
                <span id="liveUrl" style="color:var(--accent); word-break:break-all; font-weight:bold; display:block; margin:10px 0;"></span>
            </div>
            
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="window.location.reload()" style="background:#444; color:white; padding:12px; border-radius:10px; border:none; cursor:pointer; flex:1; font-weight:bold;">สร้างรายการใหม่</button>
                <button id="goToAdminBtn" class="btn-confirm" style="flex:1;">ไปหน้าจัดการผล ➔</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDoc, getDocs, updateDoc, doc, query, where, onSnapshot, orderBy, limit } from "./firebase-config.js?v=2";
        
        window.db = db;
        window.dbFunctions = { collection, addDoc, getDoc, getDocs, updateDoc, doc, query, where, onSnapshot, orderBy, limit };

        async function loadCampaigns() {
            const select = document.getElementById('campaignSelectSetup');
            try {
                const querySnapshot = await getDocs(collection(window.db, "campaigns"));
                select.innerHTML = '<option value="">-- เลือกรายการที่ต้องการดึงรายชื่อ --</option>';
                querySnapshot.forEach((doc) => {
                    select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
                });
            } catch (error) {
                console.error("Error loading campaigns: ", error);
            }
        }

        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const cid = document.getElementById('campaignSelectSetup').value;
            const btn = document.getElementById('fetchBtn');
            if (!cid) return alert("กรุณาเลือกรายการแข่งขันก่อนครับ");

            btn.innerText = "⏳ กำลังดึง...";
            try {
                const q = query(collection(window.db, "registrations"), where("campaignId", "==", cid), where("status", "==", "approved"));
                const snapshot = await getDocs(q);
                
                let players = [];
                snapshot.forEach(doc => { players.push(doc.data().playerName); });

                if (players.length === 0) {
                    alert(`ยังไม่มีผู้อนุมัติในรายการนี้`);
                    btn.innerText = "ดึงรายชื่อ";
                    return;
                }

                let targetCount = parseInt(document.getElementById('playerCount').value) || 32;
                if (players.length > targetCount) {
                    targetCount = players.length;
                    document.getElementById('playerCount').value = targetCount;
                }

                window.generateInputFields();
                const inputs = document.querySelectorAll('.playerName');
                players.forEach((name, index) => { if(inputs[index]) inputs[index].value = name; });

                alert(`✅ ดึงรายชื่อสำเร็จ ${players.length} คน!`);
                btn.innerText = "ดึงรายชื่อ";
            } catch (e) {
                alert("เกิดข้อผิดพลาด: " + e.message);
                btn.innerText = "ดึงรายชื่อ";
            }
        });

        window.onload = loadCampaigns;
    </script>
    <script src="script.js?v=2"></script>
</body>
</html>
