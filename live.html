<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>G2 LIVE | Grand Final Mode</title>
</head>
<body>
    <div class="live-container">
        <div id="bracketWrapper">
            <div id="bracket"></div>
        </div>
    </div>

    <script type="module">
        import { db, doc, onSnapshot } from "./firebase-config.js?v=8";
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('id');
        let zoneIdx = 0;
        let zonesSequence = [0, 1, 2, 3]; // เริ่มต้นด้วยโซนปกติ

        if (tourneyId) {
            onSnapshot(doc(db, "tournaments", tourneyId), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.currentPlayers = data.players || [];
                    window.currentMatches = data.matches || {};
                    
                    const totalZones = Math.ceil(window.currentPlayers.length / 32);
                    zonesSequence = Array.from({length: totalZones}, (_, i) => i);
                    
                    // ✨ ถ้าเริ่มมีผลแชมป์โซน ให้เพิ่มรอบ Grand Final (99) เข้าไปในคิวการสลับหน้าจอ
                    if (Object.keys(window.currentMatches).some(key => key.startsWith('winner-zone-'))) {
                        zonesSequence.push(99);
                    }

                    const switchZone = () => {
                        const activeZone = zonesSequence[zoneIdx];
                        window.initBracket(window.currentPlayers, window.currentMatches, activeZone);
                        zoneIdx = (zoneIdx + 1) % zonesSequence.length;
                    };

                    if (!window.initialRender) {
                        switchZone();
                        window.initialRender = true;
                        if (window.slideTimer) clearInterval(window.slideTimer);
                        window.slideTimer = setInterval(switchZone, 15000); 
                    }
                }
            });
        }
    </script>
    <script src="script.js?v=8"></script>
</body>
</html>
