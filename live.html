<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>G2 LIVE | 100+ Players Mode</title>
</head>
<body>
    <div class="live-container">
        <div id="bracketWrapper">
            <div id="bracket"></div>
        </div>
    </div>

    <script type="module">
        import { db, doc, onSnapshot } from "./firebase-config.js?v=7";
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('id');
        let zoneIdx = 0;

        if (tourneyId) {
            onSnapshot(doc(db, "tournaments", tourneyId), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const players = data.players;
                    const matches = data.matches || {};
                    const totalZones = Math.ceil(players.length / 32);

                    // ฟังก์ชันสลับโซน
                    const switchZone = () => {
                        window.initBracket(players, matches, zoneIdx);
                        zoneIdx = (zoneIdx + 1) % totalZones;
                    };

                    switchZone(); // รันครั้งแรก
                    if (window.slideTimer) clearInterval(window.slideTimer);
                    window.slideTimer = setInterval(switchZone, 15000); // สลับทุก 15 วินาที
                }
            });
        }
    </script>
    <script src="script.js?v=7"></script>
</body>
</html>
