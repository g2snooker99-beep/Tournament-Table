<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css?v=grandlux">
    <title>G2 LIVE | TV Broadcast</title>
    <style>
        #liveControls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.95); padding: 15px 25px; border-radius: 50px;
            display: flex; gap: 15px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 1000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.05;
        }
        #liveControls:hover { opacity: 1; bottom: 35px; }
        .ctrl-btn {
            padding: 10px 25px; border-radius: 30px; border: none; cursor: pointer;
            font-weight: 800; font-family: 'Kanit', sans-serif; font-size: 1.1em;
            background: #2a2a35; color: #fff; transition: 0.2s;
        }
        .ctrl-btn:hover { background: #444; transform: scale(1.05); }
        .ctrl-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }
        .ctrl-btn.final-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold-glow); }
        .auto-btn { background: #28a745; color: white; }
        .auto-btn.paused { background: #dc3545; color: white; }
        .live-header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1001; padding: 14px 18px; border-radius: 18px;
            background: rgba(10, 10, 15, 0.88); border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
            backdrop-filter: blur(10px); text-align: center;
        }
        #liveTitle { color: white; font-size: 1.15em; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        #liveStage { color: var(--gold); font-size: 0.9em; margin-top: 4px; letter-spacing: 1px; }

        /* ── BRACKET FULL SCREEN SCALE ── */
        body { margin: 0; overflow: hidden; width: 100vw; height: 100vh; }

        .live-container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding-top: 70px; /* เว้นหัว */
            padding-bottom: 100px; /* เว้น sponsor bar */
            box-sizing: border-box;
        }

        #bracketWrapper {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Scale bracket ให้เต็มพื้นที่ที่มี */
        #bracket {
            transform-origin: center center;
        }

        .bracket-visual {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center;
            width: 100%;
        }

        /* ซ่อนชื่อไฟล์โลโก้บนหน้า live */
        .sp-wheel-name { display: none !important; }

        /* ── SPONSOR BAR ── */
        #sponsorBar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0,0,0,0.88), rgba(20,15,0,0.92));
            border-top: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 -4px 40px rgba(0,0,0,0.6);
            z-index: 500;
            overflow: hidden;
        }
        #sponsorBar.hidden { display: none; }
        #sponsorBar::before {
            content: 'POWERED BY';
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            font-size: 8px; letter-spacing: 3px;
            color: rgba(255,215,0,0.25); font-weight: bold;
        }
        .sp-wheel-slide {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center; gap: 14px;
            opacity: 0; transform: perspective(800px) rotateY(90deg) scale(0.8);
            transition: all 0.65s cubic-bezier(0.4,0,0.2,1); pointer-events: none;
        }
        .sp-wheel-slide.active { opacity: 1; transform: perspective(800px) rotateY(0deg) scale(1); }
        .sp-wheel-slide.exit   { opacity: 0; transform: perspective(800px) rotateY(-90deg) scale(0.8); }
        .sp-wheel-slide img {
            max-height: 64px; max-width: 200px; object-fit: contain;
            animation: spGlow 3s ease-in-out infinite;
        }
        @keyframes spGlow {
            0%,100% { filter: drop-shadow(0 0 8px rgba(255,215,0,0.35)); }
            50%      { filter: drop-shadow(0 0 22px rgba(255,215,0,0.75)); }
        }
        .sp-wheel-name {
            color: rgba(255,215,0,0.65); font-size: 11px;
            font-weight: bold; letter-spacing: 3px; text-transform: uppercase;
        }
        #spProgress {
            position: absolute; bottom: 0; left: 0; height: 2px;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            width: 0%; box-shadow: 0 0 8px #ffd700; border-radius: 0 2px 0 0;
        }
        .sp-dots {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; gap: 5px;
        }
        .sp-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: rgba(255,255,255,0.15); transition: 0.3s; cursor: pointer;
        }
        .sp-dot.active { background: #ffd700; box-shadow: 0 0 6px #ffd700; transform: scale(1.5); }
    </style>
</head>
<body>
    <div id="liveHeader" class="live-header">
        <div id="liveTitle">TOURNAMENT LIVE</div>
        <div id="liveStage">กำลังโหลด...</div>
    </div>

    <div class="live-container">
        <div id="bracketWrapper">
            <div id="bracket"></div>
        </div>
    </div>

    <div id="liveControls"></div>

    <!-- Sponsor Bar -->
    <div id="sponsorBar" class="hidden"></div>

    <script type="module">
        import { db, doc, getDoc, onSnapshot } from "./firebase-config.js?v=10";
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('id');

        let zonesSequence = [0];
        let zoneIdx = 0;
        let isAutoPlay = true;
        let slideTimer = null;

        const getZoneLabel = (zoneValue) => zoneValue === 99 ? "GRAND FINAL" : `ZONE ${String.fromCharCode(65 + zoneValue)}`;

        function updateLiveHeader(campaignName = "Tournament Live") {
            const currentZone = zonesSequence[zoneIdx] ?? 0;
            document.getElementById('liveTitle').innerText = campaignName;
            document.getElementById('liveStage').innerText = `กำลังแสดง ${getZoneLabel(currentZone)}`;
            document.title = `Tournament-Table | ${campaignName} Live`;
        }

        async function resolveTournamentName(data) {
            if (data.campaignName) return data.campaignName;
            if (!data.campaignId) return "";
            try {
                const campaignSnap = await getDoc(doc(db, "campaigns", data.campaignId));
                if (campaignSnap.exists()) return campaignSnap.data().name || "";
            } catch (e) { console.error(e); }
            return "";
        }

        function renderControls() {
            const ctrl = document.getElementById('liveControls');
            ctrl.innerHTML = '';
            const autoBtn = document.createElement('button');
            autoBtn.innerHTML = isAutoPlay ? "⏸️ สั่งหยุดหมุน (แช่จอ)" : "▶️ สั่งหมุนออโต้";
            autoBtn.className = `ctrl-btn auto-btn ${!isAutoPlay ? 'paused' : ''}`;
            autoBtn.onclick = () => {
                isAutoPlay = !isAutoPlay;
                if (isAutoPlay) startAutoPlay();
                else clearInterval(slideTimer);
                renderControls();
            };
            ctrl.appendChild(autoBtn);
            zonesSequence.forEach((z, index) => {
                const btn = document.createElement('button');
                const isFinal = z === 99;
                btn.innerText = isFinal ? "🏆 GRAND FINAL" : `ZONE ${String.fromCharCode(65 + z)}`;
                let activeClass = '';
                if (index === zoneIdx && !isAutoPlay) activeClass = isFinal ? 'active final-btn' : 'active';
                btn.className = `ctrl-btn ${activeClass}`;
                btn.onclick = () => {
                    isAutoPlay = false;
                    clearInterval(slideTimer);
                    zoneIdx = index;
                    window.initBracket(window.currentPlayers, window.currentMatches, z);
                    updateLiveHeader(window.currentTournamentName || "Tournament Live");
                    renderControls();
                };
                ctrl.appendChild(btn);
            });
        }

        function startAutoPlay() {
            clearInterval(slideTimer);
            slideTimer = setInterval(() => {
                if (!isAutoPlay || zonesSequence.length <= 1) return;
                zoneIdx = (zoneIdx + 1) % zonesSequence.length;
                const activeZone = zonesSequence[zoneIdx];
                window.initBracket(window.currentPlayers, window.currentMatches, activeZone);
                updateLiveHeader(window.currentTournamentName || "Tournament Live");
            }, 15000);
        }

        if (tourneyId) {
            onSnapshot(doc(db, "tournaments", tourneyId), async (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.currentPlayers = data.players || [];
                    window.currentMatches = data.matches || {};
                    window.currentTournamentName = await resolveTournamentName(data) || "Tournament Live";
                    const totalZones = Math.ceil(window.currentPlayers.length / 32);
                    zonesSequence = Array.from({length: totalZones}, (_, i) => i);
                    if (Object.keys(window.currentMatches).some(key => key.startsWith('winner-zone-'))) {
                        if (!zonesSequence.includes(99)) zonesSequence.push(99);
                    }
                    if (zoneIdx >= zonesSequence.length) zoneIdx = 0;
                    renderControls();
                    if (!window.initialRender) {
                        window.initBracket(window.currentPlayers, window.currentMatches, zonesSequence[zoneIdx]);
                        if (isAutoPlay) startAutoPlay();
                        updateLiveHeader(window.currentTournamentName);
                        window.initialRender = true;
                    } else {
                        window.initBracket(window.currentPlayers, window.currentMatches, zonesSequence[zoneIdx]);
                    }
                }
            });
        }
    </script>
    <script src="script.js?v=10"></script>

    <!-- Auto-scale bracket ให้เต็มจอ -->
    <script>
    function scaleBracket() {
        const bracket = document.getElementById('bracket');
        const wrapper = document.getElementById('bracketWrapper');
        if (!bracket || !wrapper) return;

        // reset ก่อนวัด
        bracket.style.transform = 'scale(1)';
        bracket.style.transformOrigin = 'center center';

        const bw = bracket.scrollWidth;
        const bh = bracket.scrollHeight;
        const ww = wrapper.clientWidth;
        const wh = wrapper.clientHeight;

        if (!bw || !bh) return;

        const scaleX = ww / bw;
        const scaleY = wh / bh;
        const scale = Math.min(scaleX, scaleY, 1.6); // max scale 1.6x

        bracket.style.transform = `scale(${scale})`;
    }

    // scale ทุกครั้งที่ bracket เปลี่ยน
    const origInit = window.initBracket;
    window.initBracket = function(...args) {
        if (origInit) origInit.apply(this, args);
        setTimeout(scaleBracket, 120);
    };

    window.addEventListener('resize', scaleBracket);
    setTimeout(scaleBracket, 500);
    </script>

    <!-- SPONSOR WHEEL — อ่านจาก localStorage เดียวกับ bracket.html -->
    <script>
    (function(){
        const KEY = 'g2_sponsors_v2';
        let sponsors = [], idx = 0, timer = null, raf = null, t0 = null, spd = 4000;

        function load() {
            try { sponsors = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { sponsors = []; }
            spd = parseInt(localStorage.getItem('g2_sp_spd')) || 4000;
        }

        function build() {
            const bar = document.getElementById('sponsorBar');
            if (!bar) return;
            if (!sponsors.length) { bar.classList.add('hidden'); clearInterval(timer); cancelAnimationFrame(raf); return; }
            bar.classList.remove('hidden');

            // เคลียร์ของเก่า แต่เก็บ ::before ไว้
            bar.innerHTML = '';

            const prog = document.createElement('div'); prog.id = 'spProgress'; bar.appendChild(prog);

            sponsors.forEach((sp, i) => {
                const s = document.createElement('div');
                s.className = 'sp-wheel-slide' + (i === 0 ? ' active' : '');
                s.dataset.i = i;
                const img = document.createElement('img'); img.src = sp.logo; img.draggable = false;
                const nm = document.createElement('div'); nm.className = 'sp-wheel-name'; nm.textContent = sp.name;
                s.append(img, nm); bar.appendChild(s);
            });

            if (sponsors.length > 1) {
                const dots = document.createElement('div'); dots.className = 'sp-dots';
                sponsors.forEach((_, i) => {
                    const d = document.createElement('div');
                    d.className = 'sp-dot' + (i === 0 ? ' active' : '');
                    d.onclick = () => go(i, true);
                    dots.appendChild(d);
                });
                bar.appendChild(dots);
            }
            idx = 0; startProg(); auto();
        }

        function go(next, manual = false) {
            const slides = document.querySelectorAll('.sp-wheel-slide');
            const dots   = document.querySelectorAll('.sp-dot');
            slides.forEach(s => { if (+s.dataset.i === idx) s.classList.add('exit'); s.classList.remove('active'); });
            setTimeout(() => {
                slides.forEach(s => s.classList.remove('exit'));
                idx = (next + sponsors.length) % sponsors.length;
                slides.forEach(s => { if (+s.dataset.i === idx) s.classList.add('active'); });
                dots.forEach((d, i) => d.classList.toggle('active', i === idx));
            }, 350);
            if (manual) { clearInterval(timer); setTimeout(auto, spd); }
            startProg();
        }

        function startProg() {
            cancelAnimationFrame(raf); t0 = performance.now();
            const el = document.getElementById('spProgress');
            if (!el || sponsors.length <= 1) return;
            el.style.width = '0%';
            const tick = ts => {
                const p = Math.min(100, ((ts - t0) / spd) * 100);
                el.style.width = p + '%';
                if (p < 100) raf = requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
        }

        function auto() {
            clearInterval(timer);
            if (sponsors.length <= 1) { startProg(); return; }
            startProg();
            timer = setInterval(() => go(idx + 1), spd);
        }

        // รีเฟรชถ้า bracket.html บันทึก sponsor ใหม่
        window.addEventListener('storage', e => {
            if (e.key === KEY || e.key === 'g2_sp_spd') { load(); build(); }
        });

        document.addEventListener('DOMContentLoaded', () => { load(); build(); });
    })();
    </script>
</body>
</html>
