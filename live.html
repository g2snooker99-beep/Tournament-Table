<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE | ผลการแข่งขันสด</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: hidden; } /* ป้องกันการเลื่อนหน้าจอสำหรับเปิดบน TV */
        .player-slot { cursor: default !important; } /* ปิด cursor นิ้วมือ */
    </style>
</head>
<body>
    <div class="container" style="max-width: 100vw;">
        <h1 id="liveTitle" style="text-align:center; color:var(--gold); text-shadow: 0 0 20px var(--gold-glow); margin-bottom:0;">Tournament Live Score</h1>
        <p id="liveStatus" style="text-align:center; color:var(--accent); margin-bottom:30px;">🔴 กำลังดึงข้อมูลสด...</p>

        <div id="bracketWrapper">
            <div id="bracket" class="bracket-visual"></div>
        </div>
    </div>

    <script type="module">
        import { db, doc, onSnapshot, collection, query, orderBy, limit, getDocs } from "./firebase-config.js?v=5";

        // ลอจิก: ถ้าไม่มี ID ใน URL ให้ดึงรายการล่าสุดที่เพิ่งอัปเดตมาโชว์
        const urlParams = new URLSearchParams(window.location.search);
        let tourneyId = urlParams.get('id');

        async function startLive() {
            if (!tourneyId) {
                const q = query(collection(db, "tournaments"), orderBy("updatedAt", "desc"), limit(1));
                const snap = await getDocs(q);
                if (!snap.empty) tourneyId = snap.docs[0].id;
            }

            if (tourneyId) {
                onSnapshot(doc(db, "tournaments", tourneyId), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('liveStatus').innerHTML = `🔴 LIVE: ${data.campaignName || 'กำลังแข่งขัน'}`;
                        if (window.initBracket) window.initBracket(data.players, data.matches || {});
                    }
                });
            }
        }
        startLive();
    </script>
    <script src="script.js?v=5"></script>
</body>
</html>
