<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament-Table | Live Score</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .player-slot { cursor: default !important; pointer-events: none; }
        .container { border: none; box-shadow: none; background: transparent; width: 100%; max-width: 100%; }
    </style>
</head>
<body class="view-only">
    <div class="container">
        <h2 id="tourneyTitle" style="text-align:center; font-size: 2.5em; color: #00d4ff; margin-bottom: 30px;">
            🏆 LIVE TOURNAMENT SCORE
        </h2>
        <div id="result"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            authDomain: "tournament-table-45dca.firebaseapp.com",
            projectId: "tournament-table-45dca",
            storageBucket: "tournament-table-45dca.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- หัวใจสำคัญ: ดึงรายการล่าสุดอันเดียว (Latest Tournament) ---
        const q = query(collection(db, "tournaments"), orderBy("createdAt", "desc"), limit(1));

        onSnapshot(q, (snapshot) => {
            if (!snapshot.empty) {
                const latestDoc = snapshot.docs[0];
                const data = latestDoc.data();
                console.log("Latest Data Updated:", data);
                window.renderLiveBracket(data);
            } else {
                document.getElementById("result").innerHTML = "<p style='text-align:center;'>ยังไม่มีรายการแข่งขันในขณะนี้</p>";
            }
        });
    </script>
    <script src="script.js?v=1776831892"></script>
</body>
</html>
